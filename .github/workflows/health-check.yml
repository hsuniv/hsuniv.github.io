name: Site Health Check

on:
  schedule:
    - cron: '*/10 * * * *'   # 10분마다 자동 실행
  workflow_dispatch:           # Actions 탭에서 수동 실행 버튼

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run health check
        run: |
          python3 << 'EOF'
          import json, subprocess, datetime

          with open('sitecheck/sites.json', encoding='utf-8') as f:
              sites = json.load(f)['sites']

          results = []
          for site in sites:
              try:
                  proc = subprocess.run(
                      ['curl', '-o', '/dev/null', '-s',
                       '-w', '%{http_code} %{time_total}',
                       '-L', '--max-time', '15', '--connect-timeout', '10',
                       site['url']],
                      capture_output=True, text=True, timeout=20
                  )
                  parts = proc.stdout.strip().split()
                  status = int(parts[0]) if parts else 0
                  ms     = int(float(parts[1]) * 1000) if len(parts) > 1 else 0
              except Exception:
                  status = 0
                  ms     = 0
              results.append({'name': site['name'], 'url': site['url'], 'status': status, 'ms': ms})

          kst   = datetime.timezone(datetime.timedelta(hours=9))
          now   = datetime.datetime.now(kst)
          today = now.strftime('%Y-%m-%d')

          # status.json 저장
          with open('sitecheck/status.json', 'w', encoding='utf-8') as f:
              json.dump({'updated': now.strftime('%Y-%m-%d %H:%M KST'), 'sites': results},
                        f, ensure_ascii=False, indent=2)

          # 이번 체크에서 실패한 사이트 목록
          failed = {r['name'] for r in results if not (200 <= r['status'] < 300)}

          # history.json 업데이트
          # 구조: days[].sites = { "사이트명": 다운_횟수 }
          # 다운_횟수 × 10분 = 누적 다운 시간
          try:
              with open('sitecheck/history.json', encoding='utf-8') as f:
                  history = json.load(f)
          except Exception:
              history = {'days': []}

          days        = history.get('days', [])
          today_entry = next((d for d in days if d['date'] == today), None)

          if today_entry is None:
              today_entry = {'date': today, 'sites': {}}
              days.append(today_entry)

          # 실패한 사이트의 횟수를 1씩 누적
          site_counts = today_entry.setdefault('sites', {})
          for name in failed:
              site_counts[name] = site_counts.get(name, 0) + 1

          # sites.json에서 제거된 사이트의 history 데이터 정리
          current_names = {s['name'] for s in sites}
          for day in days:
              removed = [n for n in list(day.get('sites', {}).keys()) if n not in current_names]
              for n in removed:
                  del day['sites'][n]

          days.sort(key=lambda d: d['date'])
          history['days'] = days[-90:]   # 90일 초과분 자동 삭제

          with open('sitecheck/history.json', 'w', encoding='utf-8') as f:
              json.dump(history, f, ensure_ascii=False, indent=2)

          ok = sum(1 for r in results if 200 <= r['status'] < 300)
          print(f"완료: {len(results)}개 사이트 / 정상 {ok}개 / 오류 {len(results)-ok}개")
          if failed:
              print(f"실패 사이트: {', '.join(failed)}")
          EOF

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sitecheck/status.json sitecheck/history.json
          git diff --staged --quiet || git commit -m "chore: update status [skip ci]"
          git push
